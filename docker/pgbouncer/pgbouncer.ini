[databases]
orders_master = host=postgres-master port=5432 dbname=orders
orders_replica = host=postgres-replica port=5432 dbname=orders

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 500
default_pool_size = 25
min_pool_size = 10
reserve_pool_size = 5
server_idle_timeout = 600
query_timeout = 0
client_idle_timeout = 0
listen_backlog = 128